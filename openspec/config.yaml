schema: spec-driven

context: |
  Tech stack: React 18, Vite, Node.js, Express, MongoDB, Socket.io
  Architecture: Client-Server (SPA + REST API)
  Testing: Jest & Supertest (Backend), None (Frontend)
  Style: ESLint (Frontend)

strict_tdd: true

testing:
  strict_tdd: true
  detected: 2026-04-20
  runner:
    command: npm test
    framework: Jest
  layers:
    unit: true
    integration: true
    e2e: false
  coverage:
    available: true
    command: jest --coverage
  quality:
    linter: true
    type_checker: true
    formatter: true

phases:
  - name: Phase 1
    spec: openspec/specs/phase-1-quality-setup.md
    status: completed
  - name: Phase 2
    spec: openspec/specs/phase-2-backend-migration.md
    status: pending
  - name: Phase 3
    spec: openspec/specs/phase-3-frontend-migration.md
    status: pending

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
