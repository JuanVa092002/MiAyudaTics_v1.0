name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build contracts package
        run: pnpm -C packages/contracts run build

      - name: Server typecheck
        run: pnpm -C server run typecheck

      - name: Server build
        run: pnpm -C server run build

      - name: Server tests
        run: pnpm -C server run test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret

      - name: Client typecheck
        run: pnpm -C client run typecheck

      - name: Client tests
        run: pnpm -C client run test -- --run

      - name: Client build
        run: pnpm -C client run build
        env:
          VITE_BACKEND_URL: http://localhost:8000
