<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registro - AyudaTIC</title>
<!-- Google Fonts: Public Sans -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#b7c8e1",
                        "primary-fixed-dim": "#a4cbec",
                        "outline-variant": "#c2c7ce",
                        "inverse-surface": "#263143",

                        "inverse-primary": "#a4cbec",

                        "on-primary-fixed-variant": "#224a66",
                        "tertiary": "#0a1b2e",
                        "on-secondary-fixed-variant": "#185200",
                        "secondary-fixed": "#8afd5d",
                        "secondary": "#226d00",
                        "on-tertiary-fixed": "#0b1c30",
                        "on-secondary-fixed": "#052100",
                        "inverse-on-surface": "#ecf1ff",
                        "surface-container-high": "#dee8ff",
                        "on-background": "#111c2d",
                        "outline": "#72787e",
                        "surface-dim": "#cfdaf2",
                        "secondary-container": "#8afd5d",
                        "surface-variant": "#d8e3fb",
                        "on-secondary-container": "#257400",
                        "tertiary-fixed": "#d3e4fe",
                        "surface": "#f9f9ff",
                        "surface-container-low": "#f0f3ff",
                        "surface-container-highest": "#d8e3fb",
                        "on-tertiary-fixed-variant": "#38485d",
                        "surface-tint": "#3c627f",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#001e30",
                        "background": "#f9f9ff",
                        "on-primary-container": "#759bba",
                        "secondary-fixed-dim": "#6fdf43",
                        "surface-bright": "#f9f9ff",
                        "on-surface-variant": "#42474d",
                        "primary": "#001c2e",
                        "on-surface": "#111c2d",
                        "error": "#ba1a1a",
                        "surface-container": "#e7eeff",
                        "on-error": "#ffffff",
                        "primary-container": "#00324d",
                        "tertiary-container": "#203044",
                        "on-tertiary-container": "#8898b0",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xs": "4px",
                        "lg": "24px",
                        "gutter": "24px",
                        "base": "8px",
                        "sm": "8px",
                        "md": "16px",
                        "xl": "40px",
                        "max_width": "1280px",
                        "margin": "32px",
                        "2xl": "64px"
                    },
                    "fontFamily": {
                        "body-sm": ["Public Sans"],
                        "h3": ["Public Sans"],
                        "body-md": ["Public Sans"],
                        "h2": ["Public Sans"],
                        "h1": ["Public Sans"],

                        "display": ["Public Sans"],
                        "label-sm": ["Public Sans"],
                        "body-lg": ["Public Sans"]

                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "h3": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h2": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],

                        "label-md": ["14px", { "lineHeight": "1", "fontWeight": "600" }],
                        "display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "1", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }]

                }

        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col justify-center items-center px-gutter font-body-md text-body-md text-on-background">
<!-- Main Form Container -->
<div class="w-full max-w-[520px] bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm overflow-hidden">
<!-- Header Section -->
<div class="px-lg pt-lg pb-md border-b border-outline-variant/50 text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary-fixed mb-md">
<span class="material-symbols-outlined text-on-primary-fixed" style="font-size: 28px;">support_agent</span>
</div>
<h1 class="font-h2 text-h2 text-on-background mb-xs">Crear cuenta en AyudaTIC</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Acceso seguro y exclusivo para la comunidad institucional.</p>
</div>
<!-- Form Section -->
<div class="p-lg">
<form action="#" class="space-y-md" method="POST">
<!-- Role Selection -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-sm">Rol en la institución</label>
<div class="grid grid-cols-3 gap-sm">
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="role" type="radio" value="estudiante"/>
<div class="rounded-lg border border-outline-variant px-sm py-sm text-center hover:bg-surface-container-low peer-checked:border-primary peer-checked:bg-primary-fixed peer-checked:text-on-primary-fixed transition-colors">
<span class="block font-label-sm text-label-sm">Estudiante</span>
</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="role" type="radio" value="instructor"/>
<div class="rounded-lg border border-outline-variant px-sm py-sm text-center hover:bg-surface-container-low peer-checked:border-primary peer-checked:bg-primary-fixed peer-checked:text-on-primary-fixed transition-colors">
<span class="block font-label-sm text-label-sm">Instructor</span>
</div>
</label>
<label class="cursor-pointer">
<input class="peer sr-only" name="role" type="radio" value="administrativo"/>
<div class="rounded-lg border border-outline-variant px-sm py-sm text-center hover:bg-surface-container-low peer-checked:border-primary peer-checked:bg-primary-fixed peer-checked:text-on-primary-fixed transition-colors">
<span class="block font-label-sm text-label-sm">Administrativo</span>
</div>
</label>
</div>
</div>
<!-- Full Name -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="fullName">Nombre completo</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-background font-body-sm text-body-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="fullName" name="fullName" placeholder="Ej. Juan Pérez" required="" type="text"/>
</div>
</div>
<!-- Contact Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-md">
<!-- Institutional Email -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="email">Correo institucional</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-background font-body-sm text-body-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="email" name="email" placeholder="usuario@institucion.edu" required="" type="email"/>
</div>
</div>
<!-- Phone -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="phone">Teléfono</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">call</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-background font-body-sm text-body-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="phone" name="phone" placeholder="Opcional" type="tel"/>
</div>
</div>
</div>
<!-- Password Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-md">
<!-- Password -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="password">Contraseña</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-background font-body-sm text-body-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs" for="confirmPassword">Confirmar contraseña</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">lock_reset</span>
</div>
<input class="block w-full pl-10 pr-3 py-2 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-background font-body-sm text-body-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
</div>
</div>
<!-- Trust Microcopy -->
<div class="flex items-start gap-sm pt-sm">
<span class="material-symbols-outlined text-outline text-[16px] mt-0.5">shield</span>
<p class="font-body-sm text-body-sm text-on-surface-variant text-[13px] leading-tight">
                        Tu información está protegida por políticas de seguridad institucionales. No compartiremos tus datos con terceros.
                    </p>
</div>
<!-- Submit Action -->
<div class="pt-sm">
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors" type="submit">
                        Crear cuenta
                    </button>
</div>
</form>
</div>
<!-- Footer Action -->
<div class="px-lg py-md bg-surface-container-low border-t border-outline-variant/50 text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                ¿Ya tienes una cuenta? 
                <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors ml-1" href="#">Iniciar sesión</a>
</p>
</div>
</div>
</body></html>
